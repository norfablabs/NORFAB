broker:
  endpoint: tcp://192.168.1.24:5555
  shared_key: D>[[2]NH9#dN5?!o5DtibYYvV)ev?oRl}#P[>(q3
  zmq_auth: true

client:
  agent_profiles:
    default:
      llm:
        api_key: '{{ env.get("OPENROUTER_API_KEY") }}'
        model: openai/gpt-oss-120b:free
        profile_name: testAgent1
        provider: openrouter
    interfaces_check_agent:
      from_yaml_file: ./agents/client_agent_interface_health_checker.yaml
        
hooks:
  exit:
  - args: []
    description: Function to run on startup
    function: hooks.startup:do_on_exit
    kwargs: {}
  nornir-exit:
  - args: []
    description: Function to run on startup
    function: hooks.startup:nornir_do_on_exit
    kwargs: {}
  nornir-startup:
  - args: []
    description: Function to run on startup
    function: hooks.startup:nornir_do_on_startup
    kwargs: {}
  startup:
  - args: []
    description: Function to run on startup
    function: hooks.startup:do_on_startup
    kwargs: {}
logging:
  handlers:
    file:
      level: '{{ env.get("FILE_LOGGING_LEVEL", "INFO") }}'
    terminal:
      level: '{{ env.get("TERMINAL_LOGGING_LEVEL", "WARNING") }}'
  log_events: true
plugins:
  DummyService:
    nfcli:
      mount_path: dummy
      shell_model: plugins.dummy_service:DummyServiceNfcliShell
    worker: plugins.dummy_service:DummyServiceWorker
topology:
  broker: true
  workers:
  - netbox-worker-1.1
  - netbox-worker-1.2
  - nornir-worker-1
  - nornir-worker-2
  - nornir-worker-3
  - nornir-worker-4
  - nornir-worker-5: # fetches inventory from Netbox
      depends_on:
      - netbox-worker-1.1
      - netbox-worker-1.2
  - nornir-worker-6 # vMX
  # - agent-worker-1
  # - fastapi-worker-1
  # - dummy-worker-1
  # - workflow-worker-1
  # - fastmcp-worker-1
  # - fakenos-worker-1
workers:
  agent-worker-1:
  - agents/common.yaml
  dummy-worker-1:
  - plugins/dummy_worker_inventory.yaml
  fakenos-worker-1:
  - fakenos/common.yaml
  fastapi-worker-*:
  - fastapi/common.yaml
  fastmcp-worker-1:
  - fastmcp/common.yaml
  netbox-worker-1.*:
  - netbox/common.yaml
  nornir-*:
  - nornir/common.yaml
  nornir-worker-1*:
  - nornir/nornir-worker-1.yaml
  nornir-worker-2:
  - nornir/nornir-worker-2.yaml
  - nornir/nornir-worker-2-extra.yaml
  nornir-worker-3:
  - nornir/nornir-worker-3-non-existing-data.yaml
  nornir-worker-4:
  - nornir/nornir-worker-4.yaml
  nornir-worker-5:
  - nornir/nornir-worker-5.yaml
  nornir-worker-6:
  - nornir/nornir-worker-6.yaml
  pyats-*:
  - pyats/common.yaml
  pyats-worker-1*:
  - pyats/pyats-worker-1.yaml
  workflow-worker-1:
  - workflow/common.yaml
