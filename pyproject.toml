    "diskcache",
    "httpx",
    "datamodel-code-generator",
    "deepdiff"
]
fastapiservice = [
    "fastapi",
    "uvicorn",
    "python-multipart",
    "diskcache"
]
robot = [
    "robotframework"
]
agentservice = [
    "langchain",
    "langchain-community",
    "langchain-ollama",
    "ollama",
    "datamodel-code-generator"
]
clientagent = [
    "langgraph",
    "langchain-core",
    "langchain-openai",
    "langchain-anthropic",
    "langchain-ollama",
    "langchain-mcp-adapters",
    "fastembed",
    "qdrant-client",
    "langgraph-checkpoint-sqlite"
]
fastmcpservice = [
    "mcp",
    "diskcache"
]
fakenosservice = [
    "fakenos"
]
full = [
    "picle",
    "rich",
    "tabulate",
    "pydantic",
    "pyreadline3",
    "nornir",
    "nornir-salt",
    "cerberus",
    "jmespath",
    "napalm",
    "ncclient",
    "netmiko",
    "nornir-napalm",
    "nornir-netmiko",
    "nornir-scrapli",
    "ntc-templates",
    "paramiko",
    "pygnmi",
    "puresnmp",
    "requests",
    "scrapli",
    "scrapli-community",
    "scrapli-netconf",
    "ttp",
    "ttp-templates",
    "xmltodict",
    "lxml",
    "textfsm",
    "N2G",
    "dnspython",
    "pythonping",
    "pynetbox",
    "diskcache",
    "httpx",
    "datamodel-code-generator",
    "deepdiff",
    "fastapi",
    "uvicorn",
    "python-multipart",
    "robotframework",
    "langchain",
    "langchain-community",
    "langchain-ollama",
    "langchain-core",
    "langchain-openai",
    "langchain-anthropic",
    "langchain-mcp-adapters",
    "langgraph",
    "fastembed",
    "qdrant-client",
    "langgraph-checkpoint-sqlite",
    "ollama",
    "mcp",
    "fakenos"
]
tui = [
    "textual"
]
docs = [
    "mkdocs",
    "mkdocs-material",
    "mkdocs-material-extensions",
    "mkdocstrings",
    "pygments",
    "pymdown-extensions",
]

[tool.ruff.lint]
ignore = [
    "E712", # true-false-comparison
    "E501", # line too long
    "ANN401", # disallow Any annotation
]
select = ["E", "F", "I", "ANN"]

[tool.ruff.lint.isort]
case-sensitive = true

