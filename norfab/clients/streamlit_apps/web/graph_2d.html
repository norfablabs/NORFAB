<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script>/*INJECT*/</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: #0b0f1a;
      height: 100vh;
      overflow: hidden;
    }
    #graph-container { position: absolute; inset: 0; }
    #stats-overlay {
      position: absolute;
      bottom: 8px;
      left: 12px;
      font-size: 10px;
      color: #334155;
      pointer-events: none;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div id="graph-container"></div>
  <div id="stats-overlay"></div>
  <script src="https://unpkg.com/force-graph/dist/force-graph.min.js"></script>
  <script>
    let Graph = null, selectedNodeId = null;
    let searchQuery = (typeof SEARCH_QUERY !== 'undefined' && SEARCH_QUERY) ? SEARCH_QUERY : '';
    const _TAB_KEY = (typeof TAB_KEY !== 'undefined') ? TAB_KEY : '';
    const _SKIP = new Set(['x','y','vx','vy','fx','fy','index','__threeObj','__indexColor']);

    function _nodePayload(node, neighbors) {
      const data = {};
      for (const [k, v] of Object.entries(node)) {
        if (_SKIP.has(k) || k === 'id') continue;
        if (typeof v !== 'object') data[k] = v;
      }
      return { _nfnm: 1, tab: _TAB_KEY, id: node.id, data: data, neighbors: neighbors };
    }

    function initGraph() {
      const el = document.getElementById('graph-container');
      document.body.style.background = BG_COLOR;
      const data = JSON.parse(JSON.stringify(GRAPH_DATA));
      Graph = ForceGraph()(el)
        .backgroundColor(BG_COLOR)
        .width(el.clientWidth)
        .height(el.clientHeight)
        .graphData(data)
        .linkColor(() => '#475569')
        .linkWidth(1.5)
        .linkLabel(l => {
          const p = [];
          if (l.src_iface)    p.push(l.src_iface);
          if (l.dst_iface)    p.push(l.dst_iface);
          if (l.metric)       p.push('metric: ' + l.metric);
          if (l.session_type) p.push(l.session_type);
          if (l.tunnel_type)  p.push(l.tunnel_type);
          if (l.area)         p.push('area: ' + l.area);
          return p.join(' ↔ ');
        })
        .linkCanvasObjectMode(() => 'after')
        .linkCanvasObject((link, ctx) => {
          const lbl = link.src_iface
            ? link.src_iface + (link.dst_iface ? '/' + link.dst_iface : '')
            : (link.session_type || link.tunnel_type || (link.area ? 'area:' + link.area : ''));
          if (!lbl) return;
          const s = link.source, e = link.target;
          if (typeof s !== 'object' || typeof e !== 'object') return;
          ctx.save();
          ctx.font = '4px monospace';
          ctx.fillStyle = '#64748b';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(lbl, (s.x + e.x) / 2, (s.y + e.y) / 2);
          ctx.restore();
        })
        // Full custom node rendering in 'replace' mode.
        // Click + hover are handled by a custom canvas listener (setupInteraction)
        // that uses screen2GraphCoords + zoom() for reliable hit detection across
        // all nodes.  force-graph's color-picking canvas is NOT used.
        .nodeCanvasObject((node, ctx) => {
          const r = 18, isSel = node.id === selectedNodeId;
          const q = searchQuery.toLowerCase();
          const isMatch = q && (
            (node.id   && node.id.toLowerCase().includes(q)) ||
            (node.ip   && node.ip.toLowerCase().includes(q)) ||
            (node.type && node.type.toLowerCase().includes(q))
          );
          if (isMatch) {
            ctx.beginPath(); ctx.arc(node.x, node.y, r + 6, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(96,165,250,0.20)'; ctx.fill();
          }
          ctx.beginPath(); ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);
          ctx.fillStyle = isSel ? '#2563eb' : (node.color ? '#' + node.color : '#475569');
          ctx.fill();
          ctx.strokeStyle = isSel ? '#93c5fd' : 'rgba(0,0,0,0.35)';
          ctx.lineWidth = isSel ? 2 : 1; ctx.stroke();
          ctx.font = 'bold 7px monospace'; ctx.fillStyle = '#fff';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(node.name || node.id, node.x, node.y);
          if (node.ip) {
            ctx.font = '6px monospace'; ctx.fillStyle = '#94a3b8';
            ctx.textBaseline = 'top';
            ctx.fillText(node.ip, node.x, node.y + r + 3);
          }
        });
      const cf = Graph.d3Force('charge'); if (cf) cf.strength(-350);
      const lf = Graph.d3Force('link');   if (lf) lf.distance(100);
      document.getElementById('stats-overlay').textContent =
        data.nodes.length + ' nodes · ' + data.links.length + ' links';
      setupInteraction(el);
    }

    function onNodeClick(node) {
      selectedNodeId = node.id;
      const nb = [];
      Graph.graphData().links.forEach(l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        if (s === node.id) nb.push({ peer: t, local_iface: l.src_iface, remote_iface: l.dst_iface });
        else if (t === node.id) nb.push({ peer: s, local_iface: l.dst_iface, remote_iface: l.src_iface });
      });
      try { window.parent.name = JSON.stringify(_nodePayload(node, nb)); } catch (_) {}
      Graph.refresh && Graph.refresh();
    }

    function clearSelection() {
      selectedNodeId = null;
      try { window.parent.name = ''; } catch (_) {}
      Graph.refresh && Graph.refresh();
    }

    function setupInteraction(el) {
      // Find the canvas force-graph creates inside the container.
      const canvas = el.querySelector('canvas');
      if (!canvas) { setTimeout(() => setupInteraction(el), 200); return; }

      // Custom tooltip — force-graph's nodeLabel relies on its own (broken) hit
      // detection, so we build our own tooltip div.
      const tip = document.createElement('div');
      tip.style.cssText = [
        'position:fixed', 'background:#1e293b', 'border:1px solid #334155',
        'border-radius:4px', 'padding:4px 8px', 'font-size:11px', 'color:#e2e8f0',
        'pointer-events:none', 'display:none', 'z-index:9999',
        'font-family:monospace', 'max-width:240px', 'line-height:1.5'
      ].join(';');
      document.body.appendChild(tip);

      // Convert screen pixel coords to graph-space coords and find the nearest node.
      // hitR is expressed as 20 screen pixels converted to graph units so the hit
      // area is constant regardless of zoom level.
      function findNode(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const gc   = Graph.screen2GraphCoords(clientX - rect.left, clientY - rect.top);
        const hitR = 20 / (Graph.zoom() || 1);
        let best = null, bestD = hitR;
        for (const n of Graph.graphData().nodes) {
          const d = Math.hypot((n.x || 0) - gc.x, (n.y || 0) - gc.y);
          if (d < bestD) { best = n; bestD = d; }
        }
        return best;
      }

      canvas.addEventListener('mousemove', evt => {
        const node = findNode(evt.clientX, evt.clientY);
        if (node) {
          let html = '<b>' + (node.name || node.id) + '</b>';
          if (node.ip)   html += '<br>' + node.ip;
          if (node.type) html += '<br>' + node.type;
          tip.innerHTML = html;
          tip.style.display = 'block';
          tip.style.left = (evt.clientX + 14) + 'px';
          tip.style.top  = (evt.clientY + 10) + 'px';
          canvas.style.cursor = 'pointer';
        } else {
          tip.style.display = 'none';
          canvas.style.cursor = 'default';
        }
      });

      canvas.addEventListener('mouseleave', () => {
        tip.style.display = 'none';
        canvas.style.cursor = 'default';
      });

      canvas.addEventListener('click', evt => {
        const node = findNode(evt.clientX, evt.clientY);
        if (node) onNodeClick(node); else clearSelection();
      });
    }

    let graphReady = false;
    function tryInit() {
      if (graphReady) return;
      const el = document.getElementById('graph-container');
      if (el.clientWidth > 0 && el.clientHeight > 0) {
        graphReady = true;
        initGraph();
      }
    }
    tryInit();
    const _poll = setInterval(() => { tryInit(); if (graphReady) clearInterval(_poll); }, 100);
    window.addEventListener('resize', () => {
      if (!Graph) return;
      const el = document.getElementById('graph-container');
      if (el.clientWidth > 0) Graph.width(el.clientWidth).height(el.clientHeight);
    });
    try {
      const pd = window.parent.document;
      const fix = () => {
        const el = pd.querySelector('[data-testid="collapsedControl"]');
        if (el) { el.style.zIndex = '2147483647'; el.style.pointerEvents = 'auto'; el.style.position = 'fixed'; }
        // Style our own iframe from within — works because st.iframe srcdoc is same-origin.
        const self = Array.from(pd.querySelectorAll('iframe')).find(f => { try { return f.contentWindow === window; } catch(_) { return false; } });
        if (self) { self.style.border = '1px solid #334155'; self.style.borderRadius = '8px'; }
      };
      new MutationObserver(fix).observe(pd.body, { childList: true, subtree: true }); fix();
    } catch (_) {}
  </script>
</body>
</html>
