<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script>/*INJECT*/</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: #000003;
      height: 100vh;
      overflow: hidden;
    }
    #graph-container { position: absolute; inset: 0; }
    #stats-overlay {
      position: absolute;
      bottom: 8px;
      left: 12px;
      font-size: 10px;
      color: #334155;
      pointer-events: none;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div id="graph-container"></div>
  <div id="stats-overlay"></div>
  <script src="https://unpkg.com/3d-force-graph/dist/3d-force-graph.min.js"></script>
  <script type="module">
    import SpriteText from 'https://esm.sh/three-spritetext';
    import { UnrealBloomPass } from 'https://esm.sh/three/examples/jsm/postprocessing/UnrealBloomPass.js';

    const _TAB_KEY      = (typeof TAB_KEY      !== 'undefined') ? TAB_KEY      : '';
    const _SEARCH_QUERY = (typeof SEARCH_QUERY !== 'undefined') ? SEARCH_QUERY : '';

    const ORBIT_SPEEDS = [0.1, 0.3, 0.5, 1.0, 1.5, 2.0];
    const _SKIP = new Set(['x','y','z','vx','vy','vz','fx','fy','fz','index','__threeObj','__indexColor','val','name']);

    let Graph = null, selectedNodeId = null;
    let bloomPass = null, bloomActive = false;
    let orbitActive = false, orbitAngle = 0, orbitIdx = 2, orbitTimer = null;

    function nodeMatchesSearch(node) {
      const q = _SEARCH_QUERY.toLowerCase();
      if (!q) return false;
      return (
        (node.id   && node.id.toLowerCase().includes(q)) ||
        (node.ip   && node.ip.toLowerCase().includes(q)) ||
        (node.type && node.type.toLowerCase().includes(q))
      );
    }

    function nodeColor(node) {
      if (nodeMatchesSearch(node)) return '#60a5fa';
      return node.id === selectedNodeId ? '#2563eb' : (node.color ? '#' + node.color : '#475569');
    }

    function makeSprite(node) {
      const sprite = new SpriteText(node.name || node.id);
      sprite.material.depthWrite = false;
      sprite.color = nodeMatchesSearch(node) ? '#60a5fa' : '#ffffff';
      sprite.textHeight = 8;
      sprite.center.y = -0.9;
      return sprite;
    }

    function _nodePayload(node, neighbors) {
      const data = {};
      for (const [k, v] of Object.entries(node)) {
        if (_SKIP.has(k) || k === 'id') continue;
        if (typeof v !== 'object') data[k] = v;
      }
      return { _nfnm: 1, tab: _TAB_KEY, id: node.id, data: data, neighbors: neighbors };
    }

    function initGraph() {
      document.body.style.background = BG_COLOR;
      const data = JSON.parse(JSON.stringify(GRAPH_DATA));
      Graph = ForceGraph3D()(document.getElementById('graph-container'))
        .backgroundColor(BG_COLOR)
        .graphData(data)
        .nodeColor(nodeColor)
        .nodeVal(4)
        .nodeLabel(n => {
          let s = '<b>' + n.id + '</b>';
          if (n.ip)   s += '<br>' + n.ip;
          if (n.type) s += '<br>' + n.type;
          return s;
        })
        .linkCurvature('curvature')
        .linkCurveRotation('rotation')
        .linkColor(l => l.link_color || '#475569')
        .linkOpacity(0.6)
        .linkWidth(0.5)
        .linkLabel(l => {
          const p = [];
          if (l.src_iface)    p.push(l.src_iface);
          if (l.dst_iface)    p.push(l.dst_iface);
          if (l.metric)       p.push('metric: ' + l.metric);
          if (l.session_type) p.push(l.session_type);
          if (l.tunnel_type)  p.push(l.tunnel_type);
          if (l.area)         p.push('area: ' + l.area);
          return p.join(' <-> ');
        })
        .onNodeClick(onNodeClick)
        .onBackgroundClick(clearSelection)
        .nodeThreeObject(makeSprite)
        .nodeThreeObjectExtend(true);

      bloomPass = new UnrealBloomPass();
      bloomPass.strength  = 0.8;
      bloomPass.radius    = 0.3;
      bloomPass.threshold = 0.4;
      bloomPass.enabled   = false;
      bloomActive         = false;
      Graph.postProcessingComposer().addPass(bloomPass);

      document.getElementById('stats-overlay').textContent =
        data.nodes.length + ' nodes - ' + data.links.length + ' links';
    }

    function onNodeClick(node) {
      selectedNodeId = node.id;
      Graph.nodeColor(nodeColor);
      const nb = [];
      Graph.graphData().links.forEach(l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        if (s === node.id) nb.push({ peer: t, local_iface: l.src_iface, remote_iface: l.dst_iface });
        else if (t === node.id) nb.push({ peer: s, local_iface: l.dst_iface, remote_iface: l.src_iface });
      });
      try { window.parent.name = JSON.stringify(_nodePayload(node, nb)); } catch (_) {}
    }

    function clearSelection() {
      selectedNodeId = null;
      Graph.nodeColor(nodeColor);
      try { window.parent.name = ''; } catch (_) {}
    }

    function _startOrbit() {
      if (orbitTimer) clearInterval(orbitTimer);
      const cam  = Graph.cameraPosition();
      const dist = Math.sqrt(cam.x * cam.x + cam.y * cam.y + cam.z * cam.z) || 400;
      orbitAngle = Math.atan2(cam.x, cam.z);
      orbitTimer = setInterval(() => {
        orbitAngle += (Math.PI / 300) * ORBIT_SPEEDS[orbitIdx];
        Graph.cameraPosition({ x: dist * Math.sin(orbitAngle), z: dist * Math.cos(orbitAngle) });
      }, 10);
    }

    function _stopOrbit() {
      if (orbitTimer) { clearInterval(orbitTimer); orbitTimer = null; }
    }

    // Poll for orbit/bloom/speed changes pushed by the Streamlit _graph_ctrl
    // component via window.parent._nf_gctrl_{TAB_KEY}.  Applying changes here
    // avoids rebuilding the iframe HTML on every toggle, so zoom/camera is kept.
    let _lastCtrl = null;
    function _applyCtrl(ctrl) {
      if (ctrl.orbit !== orbitActive) {
        orbitActive = ctrl.orbit;
        if (orbitActive) _startOrbit(); else _stopOrbit();
      }
      if (ctrl.bloom !== bloomActive) {
        bloomActive = ctrl.bloom;
        bloomPass.enabled = bloomActive;
        Graph.renderer().toneMappingExposure = bloomActive ? 0.3 : 1;
      }
      if (ctrl.speed !== orbitIdx) {
        orbitIdx = ctrl.speed;
        if (orbitActive) { _stopOrbit(); _startOrbit(); }
      }
    }
    setInterval(() => {
      if (!Graph) return;
      try {
        const ctrl = window.parent['_nf_gctrl_' + _TAB_KEY];
        if (!ctrl || ctrl === _lastCtrl) return;
        _lastCtrl = ctrl;
        _applyCtrl(ctrl);
      } catch (_) {}
    }, 300);

    let graphReady = false;
    function tryInit() {
      if (graphReady) return;
      const el = document.getElementById('graph-container');
      if (el.clientWidth > 0 && el.clientHeight > 0) {
        graphReady = true;
        initGraph();
      }
    }
    tryInit();
    const _poll = setInterval(() => { tryInit(); if (graphReady) clearInterval(_poll); }, 100);
    try {
      const pd = window.parent.document;
      const fix = () => {
        const el = pd.querySelector('[data-testid="collapsedControl"]');
        if (el) { el.style.zIndex = '2147483647'; el.style.pointerEvents = 'auto'; el.style.position = 'fixed'; }
        // Style our own iframe from within — works because st.iframe srcdoc is same-origin.
        const self = Array.from(pd.querySelectorAll('iframe')).find(f => { try { return f.contentWindow === window; } catch(_) { return false; } });
        if (self) { self.style.border = '1px solid #334155'; self.style.borderRadius = '8px'; }
      };
      new MutationObserver(fix).observe(pd.body, { childList: true, subtree: true }); fix();
    } catch (_) {}
  </script>
</body>
</html>
