
# broker settings
broker:
  endpoint: "tcp://10.0.0.100:5555"
  
# workers inventory section
workers:
  nornir*:
    - nornir/nornir.common.yaml  
  nornir-worker-1:
    - nornir/nornir-worker-1.yaml
  netbox*:
    - netbox/netbox.common.yaml
  fastapi*:
    - fastapi/fastapi.common.yaml
  workflow*:
    - workflow/workflow.common.yaml
  fastmcp*:
    - fastmcp/fastmcp.common.yaml
  fakenos*:
    - fakenos/fakenos.common.yaml
    
# you can also source variables from the environment using Jinja2 syntax
logging:
  handlers:
    terminal:
      level: {{ env.get("TERMINAL_LOGGING_LEVEL", "WARNING") }}
    file: 
      level: {{ env.get("FILE_LOGGING_LEVEL", "INFO") }}