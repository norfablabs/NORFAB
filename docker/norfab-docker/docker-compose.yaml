services:
  norfab:
    container_name: "norfab"
    hostname: 'norfab'
    image: docker.io/dmulyalin/norfab:aio-latest
    environment:
      LOG_LEVEL: INFO
    volumes:
      - type: bind
        source: ./norfab/
        target: /etc/norfab/
    ports:
      - "8000:8000" # FastAPI ports
      - "8001:8001" # FastMCP ports
      - "5555:5555" # Broker ports
